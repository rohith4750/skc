<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Offline - SKC Caterers</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: #f9fafb; 
            color: #374151; 
            text-align: center; 
        }
        .container { 
            padding: 40px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            max-width: 400px;
        }
        h1 { color: #ea580c; margin-bottom: 10px; font-size: 24px; }
        p { margin-bottom: 25px; line-height: 1.5; color: #4b5563; }
        .logo { color: #ea580c; font-weight: 800; font-size: 28px; margin-bottom: 20px; }
        button { 
            padding: 12px 24px; 
            background: #ea580c; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        button:hover { background: #c2410c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SKC Caterers</div>
        <h1>Connection Lost</h1>
        <p>It looks like you're offline or the site is currently unavailable. Please check your internet connection.</p>
        <button onclick="window.location.href='https://www.skccaterers.in'">Retry Connection</button>
    </div>
</body>
</html>
